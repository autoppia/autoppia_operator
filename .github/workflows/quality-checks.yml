name: Quality checks

on:
  push:
    branches: [main, master, 'fix/**']
  pull_request:
    branches: [main, master, 'fix/**']

jobs:
  lint-and-audit:
    name: Lint & dependency audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "ruff>=0.10.0" pip-audit radon

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Ruff maintainability report
        run: ruff check . scripts --select C901,PLR0913,PLR0915 --output-format=concise
        continue-on-error: true

      - name: Radon cyclomatic complexity
        run: |
          echo "=== Cyclomatic complexity (. , scripts) ==="
          radon cc . scripts -a -s --total-average 2>/dev/null || true

      - name: Radon maintainability index
        run: |
          echo "=== Maintainability index (. , scripts) ==="
          radon mi . scripts -s 2>/dev/null || true

      - name: Radon complexity gate (fail on F)
        continue-on-error: true
        run: |
          bad=$(radon cc . scripts -n F --no-assert 2>/dev/null | grep -c . || true)
          if [ "${bad:-0}" -gt 0 ]; then
            echo "::error::Cyclomatic complexity F (41+) detected. Run 'radon cc . scripts -n F' locally to list."
            radon cc . scripts -n F --no-assert 2>/dev/null || true
            exit 1
          fi

      - name: Radon maintainability gate (fail on D/E)
        continue-on-error: true
        run: |
          bad=$(radon mi . scripts -n D 2>/dev/null | grep -c . || true)
          if [ "${bad:-0}" -gt 0 ]; then
            echo "::error::Maintainability index D or E detected. Run 'radon mi . scripts -n D' locally to list."
            radon mi . scripts -n D 2>/dev/null || true
            exit 1
          fi

      - name: Dependency audit
        run: pip-audit
